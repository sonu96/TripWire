services:
  tripwire:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3402:3402"
    env_file:
      - .env
    environment:
      APP_ENV: development
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3402/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
